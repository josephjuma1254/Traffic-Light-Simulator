<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Linking to the CSS file for styling the page -->
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light Simulator project</title>
</head>
<body>
    <!-- An introductory head to the initiative -->
    <h1>TRAFFIC LIGHT SIMULATOR</h1>
    <p>This initiative replicates a traffic light system.
         The traffic light will change colors to mimic real-life traffic signals.</p>
    <!-- Control buttons -->
    <div class="controls">
      <button id="start-btn" type="button">Start Simulation</button>
      <button id="stop-btn" type="button" disabled>Stop Simulation</button>
    </div>
    <div id="status" class="status" aria-live="polite">Press Start to run</div>

    <div id="traffic-light" aria-label="Traffic light">
        <div class="light red" data-color="red"></div>
        <div class="light yellow" data-color="yellow"></div>
        <div class="light green" data-color="green"></div>
    </div>

</body>
    <!-- Linking to the javascript file that contains the logic for the traffic light simulation -->
  <script src="javascript.js"></script>
</html>
